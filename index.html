<title>議事録ダッシュボード</title>
<style>
  :root {
    --bg: #eef1f7;
    --surface: #ffffff;
    --surface-sunken: #e6eaf2;
    --ink: #141826;
    --muted: #5b6478;
    --line: #dde2ec;
    --accent: #2f52d6;
    --accent-ink: #ffffff;
    --accent-soft: #e5eafb;
    --done: #0e8f74;
    --done-soft: #e0f4ee;
    --todo: #b0701f;
    --todo-soft: #f8ecd9;
    --ask: #7a4fd1;
    --ask-soft: #efe8fc;
    --shadow: 0 1px 2px rgba(20, 24, 38, 0.04), 0 4px 16px rgba(20, 24, 38, 0.05);
    color-scheme: light;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1017;
      --surface: #161a24;
      --surface-sunken: #1d2230;
      --ink: #e9ecf5;
      --muted: #8890a6;
      --line: #2a2f3f;
      --accent: #7ea0ff;
      --accent-ink: #0d1017;
      --accent-soft: #1c2440;
      --done: #4fd1ac;
      --done-soft: #142a24;
      --todo: #e5a94f;
      --todo-soft: #2c2416;
      --ask: #b79bf5;
      --ask-soft: #241f36;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 6px 20px rgba(0, 0, 0, 0.25);
      color-scheme: dark;
    }
  }
  :root[data-theme="dark"] {
    --bg: #0d1017;
    --surface: #161a24;
    --surface-sunken: #1d2230;
    --ink: #e9ecf5;
    --muted: #8890a6;
    --line: #2a2f3f;
    --accent: #7ea0ff;
    --accent-ink: #0d1017;
    --accent-soft: #1c2440;
    --done: #4fd1ac;
    --done-soft: #142a24;
    --todo: #e5a94f;
    --todo-soft: #2c2416;
    --ask: #b79bf5;
    --ask-soft: #241f36;
    --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 6px 20px rgba(0, 0, 0, 0.25);
  }
  :root[data-theme="light"] {
    --bg: #eef1f7;
    --surface: #ffffff;
    --surface-sunken: #e6eaf2;
    --ink: #141826;
    --muted: #5b6478;
    --line: #dde2ec;
    --accent: #2f52d6;
    --accent-ink: #ffffff;
    --accent-soft: #e5eafb;
    --done: #0e8f74;
    --done-soft: #e0f4ee;
    --todo: #b0701f;
    --todo-soft: #f8ecd9;
    --ask: #7a4fd1;
    --ask-soft: #efe8fc;
    --shadow: 0 1px 2px rgba(20, 24, 38, 0.04), 0 4px 16px rgba(20, 24, 38, 0.05);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Noto Sans JP", sans-serif;
    font-feature-settings: "palt" 1;
  }
  .app {
    display: grid;
    grid-template-columns: 300px 1fr;
    min-height: 100vh;
  }
  @media (max-width: 860px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--line); }
  }

  /* Sidebar */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--line);
    padding: 24px 18px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand .mark {
    width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
    background: linear-gradient(155deg, var(--accent), color-mix(in srgb, var(--accent) 60%, var(--ask)));
    display: flex; align-items: center; justify-content: center;
    color: var(--accent-ink); font-weight: 700; font-size: 13px;
  }
  .brand .text { display: flex; flex-direction: column; gap: 2px; }
  .brand .eyebrow { font-size: 10.5px; letter-spacing: 0.14em; color: var(--muted); font-weight: 700; }
  .brand h1 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
  .search { position: relative; }
  .search input {
    width: 100%; padding: 9px 12px 9px 32px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--surface-sunken);
    color: var(--ink); font-size: 13px; outline: none;
    transition: border-color 0.15s ease;
  }
  .search input:focus { border-color: var(--accent); }
  .search::before {
    content: ""; position: absolute; left: 11px; top: 50%; width: 12px; height: 12px;
    border: 1.5px solid var(--muted); border-radius: 50%;
    background: linear-gradient(var(--muted), var(--muted)) no-repeat 9px 9px / 1.5px 6px;
    rotate: 45deg; translate: 0 -50%;
  }
  .meeting-list { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
  .meeting-card {
    text-align: left; border: 1px solid var(--line); background: var(--surface-sunken);
    border-radius: 10px; padding: 12px 13px; cursor: pointer;
    display: flex; flex-direction: column; gap: 6px; color: var(--ink); font: inherit;
    transition: border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
  }
  .meeting-card:hover { border-color: color-mix(in srgb, var(--accent) 40%, var(--line)); }
  .meeting-card.active {
    border-color: var(--accent); background: var(--accent-soft); box-shadow: var(--shadow);
  }
  .meeting-card .date { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
  .meeting-card .client { font-size: 13.5px; font-weight: 700; line-height: 1.4; }
  .meeting-card .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
  .meeting-card .tag {
    font-size: 10.5px; padding: 2px 7px; border-radius: 100px;
    background: var(--surface); border: 1px solid var(--line); color: var(--muted);
  }
  .sidebar-footnote {
    margin-top: auto; font-size: 11.5px; color: var(--muted); line-height: 1.6;
    border-top: 1px solid var(--line); padding-top: 12px;
  }

  /* Main */
  .main { padding: 36px 44px 60px; max-width: 880px; }
  @media (max-width: 640px) { .main { padding: 24px 18px 40px; } }
  .brief-header {
    display: flex; flex-direction: column; gap: 10px; padding-bottom: 22px;
    border-bottom: 1px solid var(--line); margin-bottom: 24px;
  }
  .brief-header .meta-row {
    display: flex; align-items: center; gap: 10px; font-size: 12.5px; color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .brief-header .meta-row .dot { opacity: 0.5; }
  .brief-header h2 {
    margin: 0; font-size: 25px; font-weight: 700; letter-spacing: -0.01em;
    text-wrap: balance; line-height: 1.4;
  }
  .participants { display: flex; flex-wrap: wrap; gap: 16px; font-size: 12.5px; color: var(--muted); }
  .participants .group b { color: var(--ink); font-weight: 600; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 28px; }
  .stat {
    background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
    padding: 14px 16px; box-shadow: var(--shadow);
  }
  .stat .num { font-size: 27px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; }
  .stat .label { font-size: 11.5px; color: var(--muted); margin-top: 6px; }
  .stat.todo .num { color: var(--todo); }
  .stat.ask .num { color: var(--ask); }
  .stat.guide .num { color: var(--accent); }

  section.block { margin-bottom: 30px; }
  section.block h3 {
    font-size: 12.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
    margin: 0 0 12px; font-weight: 700;
  }

  .summary-text { font-size: 14.5px; line-height: 1.9; color: var(--ink); }

  .callout {
    display: flex; gap: 12px; border-radius: 10px; padding: 14px 16px;
    font-size: 13.5px; line-height: 1.8; border: 1px solid var(--line);
    background: var(--surface); box-shadow: var(--shadow);
  }
  .callout + .callout { margin-top: 8px; }
  .callout .icon {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 100px;
    display: flex; align-items: center; justify-content: center; font-size: 12px;
    font-weight: 700; margin-top: 1px;
  }
  .callout.info { border-color: color-mix(in srgb, var(--accent) 30%, var(--line)); }
  .callout.info .icon { background: var(--accent); color: var(--accent-ink); }
  .callout.done { border-color: color-mix(in srgb, var(--done) 30%, var(--line)); }
  .callout.done .icon { background: var(--done); color: var(--accent-ink); }
  .callout-body { display: flex; flex-direction: column; gap: 10px; width: 100%; min-width: 0; }
  .callout-figure {
    margin: 0; border: 1px solid var(--line); border-radius: 8px; overflow: hidden;
    background: var(--surface-sunken); max-width: 480px;
  }
  .callout-figure img { display: block; width: 100%; height: auto; }
  .callout-figure figcaption {
    padding: 7px 11px; font-size: 11.5px; color: var(--muted); border-top: 1px solid var(--line);
  }

  ul.plain { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }

  .todo-item {
    display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; background: var(--surface);
    border: 1px solid var(--line); border-left: 3px solid var(--todo); border-radius: 8px;
    padding: 11px 14px; font-size: 13.5px; line-height: 1.7; box-shadow: var(--shadow);
  }
  .todo-item .owner {
    grid-row: 1 / 3; align-self: start; font-size: 11px; font-weight: 700; color: var(--todo);
    background: var(--todo-soft); border-radius: 6px; padding: 3px 8px; white-space: nowrap;
    height: fit-content;
  }
  .todo-item .status { font-size: 11.5px; color: var(--muted); }

  .qa-item {
    background: var(--surface); border: 1px solid var(--line); border-radius: 8px;
    padding: 13px 14px; font-size: 13.5px; line-height: 1.75; box-shadow: var(--shadow);
  }
  .qa-item .q { display: flex; gap: 8px; font-weight: 600; }
  .qa-item .q .who {
    flex-shrink: 0; color: var(--ask); background: var(--ask-soft); border-radius: 6px;
    padding: 1px 8px; font-size: 11px; font-weight: 700; height: fit-content; margin-top: 2px;
  }
  .qa-item .a { margin-top: 6px; padding-left: 8px; border-left: 2px solid var(--line); color: var(--muted); }

  .keyword-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .keyword-row .kw {
    font-size: 12px; padding: 4px 10px; border-radius: 100px; background: var(--accent-soft);
    color: var(--accent); font-weight: 600;
  }

  .guide-list { display: flex; flex-direction: column; gap: 8px; }
  details.guide-item {
    background: var(--surface); border: 1px solid var(--line); border-radius: 8px;
    overflow: hidden; box-shadow: var(--shadow);
  }
  details.guide-item summary {
    list-style: none; cursor: pointer; padding: 12px 14px; font-size: 13.5px; font-weight: 600;
    display: flex; align-items: center; gap: 10px; transition: background 0.15s ease;
  }
  details.guide-item summary:hover { background: var(--surface-sunken); }
  details.guide-item summary::-webkit-details-marker { display: none; }
  details.guide-item summary::before {
    content: "+"; color: var(--accent); font-weight: 700; font-size: 15px; width: 16px;
    flex-shrink: 0; text-align: center;
  }
  details.guide-item[open] summary::before { content: "\2013"; }
  details.guide-item summary:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .guide-steps {
    margin: 0; padding: 2px 18px 16px 42px; display: flex; flex-direction: column; gap: 8px;
    font-size: 13px; line-height: 1.75; color: var(--muted);
  }
  .guide-steps li::marker { color: var(--accent); font-weight: 700; }
  .step-code {
    display: block; margin-top: 6px; padding: 8px 10px; border-radius: 6px;
    background: var(--surface-sunken); font-size: 12px; word-break: break-all;
    color: var(--ink); font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
</style>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="mark">M</div>
      <div class="text">
        <span class="eyebrow">MEETING BRIEFS</span>
        <h1>議事録ダッシュボード</h1>
      </div>
    </div>
    <div class="search">
      <input id="searchInput" type="text" placeholder="クライアント名・キーワードで検索" />
    </div>
    <nav class="meeting-list" id="meetingList"></nav>
    <p class="sidebar-footnote">議事録の文字起こしを渡すと、このリストに新しいカードとして追加されます。</p>
  </aside>

  <main class="main" id="mainView"></main>
</div>

let activeId = meetings[0].id;

function renderList(filter = "") {
  const list = document.getElementById("meetingList");
  const q = filter.trim().toLowerCase();
  const filtered = meetings.filter(m => {
    if (!q) return true;
    const hay = [m.client, m.title, ...m.tags, ...m.keywords].join(" ").toLowerCase();
    return hay.includes(q);
  });
  list.innerHTML = filtered.map(m => `
    <button class="meeting-card ${m.id === activeId ? 'active' : ''}" data-id="${m.id}">
      <span class="date">${m.date}</span>
      <span class="client">${m.client}</span>
      <span class="tags">${m.tags.map(t => `<span class="tag">${t}</span>`).join("")}</span>
    </button>
  `).join("") || `<p style="font-size:13px;color:var(--muted);padding:8px 2px;">一致する議事録がありません</p>`;

  list.querySelectorAll(".meeting-card").forEach(btn => {
    btn.addEventListener("click", () => {
      activeId = btn.dataset.id;
      renderList(document.getElementById("searchInput").value);
      renderMain();
    });
  });
}

function renderStep(s) {
  return s.split("\n").map((p, i) => i === 0 ? p : `<code class="step-code">${p}</code>`).join("");
}

function renderMain() {
  const m = meetings.find(mm => mm.id === activeId);
  const view = document.getElementById("mainView");
  if (!m) { view.innerHTML = ""; return; }

  view.innerHTML = `
    <div class="brief-header">
      <div class="meta-row">
        <span>${m.date}</span><span class="dot">·</span><span>${m.client}</span>
      </div>
      <h2>${m.title}</h2>
      <div class="participants">
        <span class="group"><b>Plan・Do・See様:</b> ${m.participants.client.join("、")}</span>
        <span class="group"><b>ご案内:</b> ${m.participants.host.join("、")}</span>
      </div>
    </div>

    <div class="stats">
      <div class="stat todo"><div class="num">${m.todos.length}</div><div class="label">確認事項</div></div>
      <div class="stat ask"><div class="num">${m.qas.length}</div><div class="label">質疑応答</div></div>
      <div class="stat guide"><div class="num">${m.guide.length}</div><div class="label">操作手順ガイド</div></div>
    </div>

    <section class="block">
      <h3>要約</h3>
      <p class="summary-text">${m.summary}</p>
    </section>

    <section class="block">
      <h3>MCP連携(AI自動反映)について</h3>
      <div class="callout info"><span class="icon">i</span><span>${m.mcpStatus}</span></div>
    </section>

    <section class="block">
      <h3>ご案内</h3>
      ${m.alreadyDone.map(note => `
        <div class="callout done">
          <span class="icon">&check;</span>
          <div class="callout-body">
            <span>${note.text}</span>
            ${note.image ? `<figure class="callout-figure"><img src="${note.image}" alt="${note.caption || ''}" loading="lazy" /><figcaption>${note.caption || ''}</figcaption></figure>` : ""}
          </div>
        </div>`).join("")}
    </section>

    <section class="block">
      <h3>確認事項</h3>
      <ul class="plain">
        ${m.todos.map(t => `
          <li class="todo-item">
            <span class="owner">${t.owner}</span>
            <span class="task">${t.task}</span>
            <span class="status">${t.status}</span>
          </li>`).join("")}
      </ul>
    </section>

    <section class="block">
      <h3>質疑応答</h3>
      <ul class="plain">
        ${m.qas.map(qa => `
          <li class="qa-item">
            <div class="q"><span class="who">${qa.who}</span><span>${qa.q}</span></div>
            <div class="a">${qa.a}</div>
          </li>`).join("")}
      </ul>
    </section>

    <section class="block">
      <h3>操作手順ガイド</h3>
      <div class="guide-list">
        ${m.guide.map(g => `
          <details class="guide-item">
            <summary>${g.title}</summary>
            <ol class="guide-steps">${g.steps.map(s => `<li>${renderStep(s)}</li>`).join("")}</ol>
          </details>`).join("")}
      </div>
    </section>

    <section class="block">
      <h3>タグ設置・CV連携ガイド</h3>
      <div class="guide-list">
        ${m.tagGuide.map(g => `
          <details class="guide-item">
            <summary>${g.title}</summary>
            <ol class="guide-steps">${g.steps.map(s => `<li>${renderStep(s)}</li>`).join("")}</ol>
          </details>`).join("")}
      </div>
    </section>

    <section class="block">
      <h3>キーワード</h3>
      <div class="keyword-row">${m.keywords.map(k => `<span class="kw">${k}</span>`).join("")}</div>
    </section>
  `;
}

document.getElementById("searchInput").addEventListener("input", e => renderList(e.target.value));
renderList();
renderMain();
